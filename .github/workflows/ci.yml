name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mlops-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev curl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Build mops
        run: |
          make clean
          make -j2

      - name: Run tests
        run: pytest -q tests

      - name: Upload task logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mops-task-logs
          path: /tmp/mops_task_*.log
          if-no-files-found: ignore
